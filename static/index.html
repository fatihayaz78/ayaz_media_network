<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sports Reel Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f4f0;--bg3:#eeedea;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9c9a96;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --accent:#1a1a18;--acc-inv:#fff;
  --success:#3b6d11;--success-bg:#eaf3de;
  --danger:#a32d2d;--danger-bg:#fcebeb;
  --info:#185fa5;--info-bg:#e6f1fb;
  --warn:#854f0b;--warn-bg:#faeeda;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;background:var(--bg2);color:var(--text);height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:9px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.brand{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.ch-wrap{display:flex;align-items:center;gap:7px;flex:1;min-width:200px}
.ch-lbl{font-size:11px;color:var(--text2);white-space:nowrap}
.ch-inp{flex:1;font-size:13px;padding:5px 10px;height:30px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text)}
.ch-inp:focus{outline:2px solid var(--accent);outline-offset:1px}
.layout{display:grid;grid-template-columns:175px 1fr;flex:1;overflow:hidden}
.sidebar{background:var(--bg2);border-right:0.5px solid var(--border);overflow-y:auto}
.slbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:12px 12px 5px}
.si{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-left:2px solid transparent;user-select:none;transition:background .1s}
.si:hover{background:var(--bg3)}
.si.on{background:var(--bg);border-left-color:var(--accent)}
.si-ico{font-size:15px;width:20px;text-align:center}
.si-name{font-size:13px}
.si-cnt{margin-left:auto;font-size:10px;padding:1px 7px;border-radius:10px;background:var(--success-bg);color:var(--success);font-weight:600}
.si-err{margin-left:auto;font-size:10px;padding:1px 7px;border-radius:10px;background:var(--danger-bg);color:var(--danger)}
.si-load{margin-left:auto;font-size:11px;color:var(--text3);animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.main{background:var(--bg);display:flex;flex-direction:column;overflow-y:auto}
.m-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.m-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.sec{padding:11px 16px;border-bottom:0.5px solid var(--border)}
.sec-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.mz{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.mz:hover{background:var(--bg2)}
.mt{width:68px;height:40px;border-radius:6px;background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.mi{font-size:12px;color:var(--text2);line-height:1.6}
.mi strong{color:var(--text)}
.fr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
input[type=datetime-local]{font-size:12px;padding:4px 8px;height:30px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text)}
.fbtn{height:30px;padding:0 14px;font-size:12px;font-weight:600;background:var(--accent);color:var(--acc-inv);border:none;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s}
.fbtn:hover{opacity:.85}
.fbtn:disabled{opacity:.4;cursor:not-allowed}
.rsec{padding:11px 16px;flex:1}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rt{font-size:13px;font-weight:600}
.addbtn{height:27px;padding:0 12px;font-size:11px;border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--text);font-weight:500}
.addbtn:hover{background:var(--bg2)}
.lg-group{margin-bottom:10px;border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.lg-hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg2);border-bottom:0.5px solid var(--border)}
.lg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lg-def{font-size:11px;color:var(--text2)}
.lg-sep{font-size:10px;color:var(--text3)}
.lg-cinp{font-size:11px;padding:2px 7px;height:24px;border-radius:5px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);flex:1;max-width:200px}
.lg-cinp:focus{outline:1px solid var(--accent)}
.lg-cnt{font-size:10px;color:var(--text3);margin-left:auto;white-space:nowrap}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:5px 8px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;background:var(--bg2);border-bottom:0.5px solid var(--border);text-align:left}
td{padding:7px 8px;font-size:12px;border-bottom:0.5px solid var(--border)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2)}
.sc{font-weight:700;font-family:monospace;font-size:13px}
.acts{display:flex;gap:3px}
.ib{width:25px;height:25px;border:0.5px solid var(--border);border-radius:5px;cursor:pointer;background:transparent;display:flex;align-items:center;justify-content:center;font-size:12px}
.ib:hover{background:var(--bg2)}
.ib.del:hover{background:var(--danger-bg);color:var(--danger)}
.etr td{background:var(--info-bg)}
.ei{font-size:11px;padding:2px 5px;height:22px;border-radius:4px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);width:100%}
.af{background:var(--success-bg);border:0.5px solid #c0dd97;border-radius:var(--radius);padding:8px 10px;margin-bottom:8px;display:grid;grid-template-columns:1fr 68px 1fr 90px 80px auto;gap:6px;align-items:center}
.afi{font-size:12px;padding:3px 7px;height:28px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text)}
.rbar{padding:11px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-top:0.5px solid var(--border);flex-shrink:0;flex-wrap:wrap;gap:10px}
.rmeta{font-size:12px;color:var(--text2);line-height:1.7}
.rbtn{height:38px;padding:0 20px;font-size:13px;font-weight:700;background:var(--accent);color:var(--acc-inv);border:none;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;gap:8px}
.rbtn:hover{opacity:.85}
.rbtn:disabled{opacity:.35;cursor:not-allowed}
.empty{text-align:center;padding:28px;color:var(--text3);font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-lg)}
.loading{text-align:center;padding:28px;color:var(--text2);font-size:13px}
.spin{display:inline-block;animation:spin .7s linear infinite}
.errbox{padding:9px 12px;background:var(--danger-bg);border:0.5px solid #f7c1c1;border-radius:var(--radius);font-size:12px;color:var(--danger);margin-top:8px}
.infobox{padding:9px 12px;background:var(--info-bg);border:0.5px solid #b5d4f4;border-radius:var(--radius);font-size:12px;color:var(--info)}
.pill{font-size:9px;padding:1px 6px;border-radius:8px;background:var(--success-bg);color:var(--success);font-weight:600}
.pill.ns{background:var(--bg2);color:var(--text3)}
.dl-box{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--success-bg);border:0.5px solid #c0dd97;border-radius:var(--radius)}
.dl-btn{height:30px;padding:0 14px;font-size:12px;font-weight:600;background:var(--success);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span>🏆</span> Ayaz Media Network</div>
  <div class="ch-wrap">
    <span class="ch-lbl">Kanal adı:</span>
    <input class="ch-inp" id="ch-name" type="text" placeholder="Channel name..." oninput="setChannelName(active,this.value);refreshRebar()">
  </div>
  <span id="api-status" style="font-size:11px;color:#6b6b67"></span>
</div>

<div class="layout">
  <div class="sidebar">
    <div id="sport-list"></div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
const BASE = "";

// ── Sport/Channel definitions ─────────────────────────────────
const SPORTS = [
  {id:"futbol",   icon:"⚽", name:"Football",       channel:"ayaz_sports",
   fetch_mode:"sport",    sport_id:"futbol"},
  {id:"basket",   icon:"🏀", name:"Basketball",     channel:"ayaz_sports",
   fetch_mode:"sport",    sport_id:"basket"},
  {id:"amerikan", icon:"🏈", name:"American Football", channel:"ayaz_sports",
   fetch_mode:"sport",    sport_id:"amerikan"},
  {id:"motor",    icon:"🏎️", name:"Motorsport",     channel:"ayaz_sports",
   fetch_mode:"sport",    sport_id:"motor"},
  {id:"tenis",    icon:"🎾", name:"Tennis",          channel:"ayaz_sports",
   fetch_mode:"sport",    sport_id:"tenis"},
  {id:"voley",    icon:"🏐", name:"Volleyball",      channel:"ayaz_sports",
   fetch_mode:"sport",    sport_id:"voley"},
  {id:"dovus",    icon:"🥊", name:"Combat Sports",   channel:"ayaz_sports",
   fetch_mode:"sport",    sport_id:"dovus"},
  {id:"diger",    icon:"🏒", name:"Other Sports",    channel:"ayaz_sports",
   fetch_mode:"sport",    sport_id:"diger"},

  {id:"fixtures", icon:"📅", name:"Fixtures",       channel:"ayaz_fixtures",
   fetch_mode:"channel",  channel_id:"fixtures"},

  {id:"transfer", icon:"🔁", name:"Transfers",      channel:"ayaz_transfer",
   fetch_mode:"channel",  channel_id:"transfer"},

  {id:"finance",  icon:"📈", name:"Finance",        channel:"ayaz_finance",
   fetch_mode:"channel",  channel_id:"finance"},

  {id:"news",     icon:"🌍", name:"World News",     channel:"ayaz_news",
   fetch_mode:"channel",  channel_id:"news"},

  {id:"games_steam",  icon:"🎮", name:"Steam Charts",  channel:"ayaz_gamezs",
   fetch_mode:"channel", channel_id:"games", fmt:"steam_charts"},
  {id:"games_esports",icon:"🏆", name:"Esports",       channel:"ayaz_gamezs",
   fetch_mode:"channel", channel_id:"games", fmt:"esports"},
  {id:"games_deals",  icon:"🎁", name:"Game Deals",    channel:"ayaz_gamezs",
   fetch_mode:"channel", channel_id:"games", fmt:"game_deals"},

  {id:"music_eu", icon:"🎵", name:"Music Europe",   channel:"ayaz_musics",
   fetch_mode:"channel",  channel_id:"music", continent:"EUROPE"},
  {id:"music_am", icon:"🎵", name:"Music Americas", channel:"ayaz_musics",
   fetch_mode:"channel",  channel_id:"music", continent:"AMERICAS"},
  {id:"music_tr", icon:"🎵", name:"Music Turkey",   channel:"ayaz_musics",
   fetch_mode:"channel",  channel_id:"music", continent:"TURKEY"},

  {id:"techai",   icon:"🤖", name:"AI & Tech",      channel:"ayaz_techai",
   fetch_mode:"channel",  channel_id:"techai"},
];

const CHANNEL_GROUPS = [
  {label:"@ayaz_sports",   ids:["futbol","basket","amerikan","motor","tenis","voley","dovus","diger"]},
  {label:"@ayaz_fixtures", ids:["fixtures"]},
  {label:"@ayaz_transfer", ids:["transfer"]},
  {label:"@ayaz_finance",  ids:["finance"]},
  {label:"@ayaz_news",     ids:["news"]},
  {label:"@ayaz_gamezs",   ids:["games_steam","games_esports","games_deals"]},
  {label:"@ayaz_musics",   ids:["music_eu","music_am","music_tr"]},
  {label:"@ayaz_techai",   ids:["techai"]},
];

const THEME_MAP = {
  "futbol":"futbol","basket":"basket","amerikan":"amerikan","motor":"motor",
  "tenis":"tenis","voley":"voley","dovus":"dovus","diger":"diger",
  "fixtures":"fixtures","transfer":"transfer","finance":"finance",
  "news":"news","techai":"techai",
  "games_steam":"games","games_esports":"games","games_deals":"games",
  "music_eu":"music","music_am":"music","music_tr":"music",
};

const DEFAULT_CHANNEL_NAMES = {
  "ayaz_sports":"ayaz_sports","ayaz_fixtures":"ayaz_fixtures",
  "ayaz_transfer":"ayaz_transfer","ayaz_finance":"ayaz_finance",
  "ayaz_news":"ayaz_news","ayaz_gamezs":"ayaz_gamezs",
  "ayaz_musics":"ayaz_musics","ayaz_techai":"ayaz_techai",
};

function getChannelName(sportId){
  const sp = SPORTS.find(s=>s.id===sportId);
  const ch = sp?.channel || sportId;
  return localStorage.getItem("ch_name_"+ch) || DEFAULT_CHANNEL_NAMES[ch] || ch;
}
function setChannelName(sportId, name){
  const sp = SPORTS.find(s=>s.id===sportId);
  localStorage.setItem("ch_name_"+(sp?.channel||sportId), name);
}

const LC = {
  "Trendyol Süper Lig":"#E84040","LaLiga":"#FF6B35","Serie A":"#0057A8",
  "Bundesliga":"#E30613","Premier League":"#6F2DBD","Ligue 1":"#003F87",
  "NBA":"#C9082A","EuroLeague":"#003DA5","BSL":"#E84040",
  "Formula 1":"#E8002D","MotoGP":"#CC0000","ATP":"#1A7BC4","WTA":"#C41A5A",
  "Brasileirão Betano":"#009C3B","VriendenLoterij Eredivisie":"#FF6600",
  "Liga Portugal Betclic":"#006400","Pro League":"#3C3C3C",
};
function lcolor(n){for(const k of Object.keys(LC))if(n&&n.includes(k))return LC[k];return"#888";}

// ── State ─────────────────────────────────────────────────────────────────────
const DATA    = {};
const LOADING = {};
const LERR    = {};
const MEDIA   = {};
const LNAMES  = {};
const DLURL   = {};

let musicTrack   = null;
let musicVolume  = 0.4;
let pixTracks    = [];
let musicLoading = false;

let active = "futbol";
let editId = null;
let adding = false;
let nid    = 5000;

// ── Tarih state — renderMain çağrılınca sıfırlanmaz ──────────────────────────
function today(){ const d=new Date(); return d.toISOString().slice(0,10); }
let dateFrom = today()+"T00:00";
let dateTo   = today()+"T23:59";

function groupBy(rows){
  const m={};
  (rows||[]).forEach(r=>{ if(!m[r.league])m[r.league]=[]; m[r.league].push(r); });
  return Object.entries(m);
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar(){
  document.getElementById("sport-list").innerHTML = CHANNEL_GROUPS.map(group=>{
    const items = SPORTS.filter(s=>group.ids.includes(s.id));
    return `
      <div class="slbl">${group.label}</div>
      ${items.map(s=>{
        const cnt = (DATA[s.id]||[]).length;
        const ld  = LOADING[s.id];
        const err = LERR[s.id] && !cnt;
        return `<div class="si${s.id===active?" on":""}" onclick="selSport('${s.id}')">
          <span class="si-ico">${s.icon}</span>
          <span class="si-name">${s.name}</span>
          ${ld  ? `<span class="si-load">◌</span>` :
            err ? `<span class="si-err">!</span>` :
            cnt ? `<span class="si-cnt">${cnt}</span>` : ""}
        </div>`;
      }).join("")}`;
  }).join("");
}

function getDefaultDates(sportId){
  const t = new Date();
  const fmt = d=>d.toISOString().slice(0,10);
  if(sportId==="fixtures"){
    const n7=new Date(t); n7.setDate(t.getDate()+7);
    return {from:fmt(t)+"T00:00", to:fmt(n7)+"T23:59"};
  }
  if(["music_eu","music_am","music_tr","techai"].includes(sportId)){
    const p7=new Date(t); p7.setDate(t.getDate()-7);
    return {from:fmt(p7)+"T00:00", to:fmt(t)+"T23:59"};
  }
  return {from:fmt(t)+"T00:00", to:fmt(t)+"T23:59"};
}

function selSport(id){
  active=id; editId=null; adding=false;
  const defaults=getDefaultDates(id);
  if(!DATA[id]){ dateFrom=defaults.from; dateTo=defaults.to; }
  document.getElementById("ch-name").value = getChannelName(id);
  renderSidebar(); renderMain();
}

// ── Main ──────────────────────────────────────────────────────────────────────
function renderMain(){
  const sp    = SPORTS.find(s=>s.id===active);
  const rows  = DATA[active]||[];
  const groups= groupBy(rows);
  const media = MEDIA[active];
  const ld    = LOADING[active];
  const err   = LERR[active];
  const dl    = DLURL[active];

  document.getElementById("main").innerHTML = `
  <div class="m-hdr">
    <div class="m-title">
      <span style="font-size:18px">${sp.icon}</span>${sp.name}
      ${rows.length?`<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:var(--success-bg);color:var(--success);font-weight:600">${rows.length} sonuç</span>`:""}
      ${ld?`<span style="font-size:12px;color:var(--text3)"><span class="spin">◌</span> Çekiliyor...</span>`:""}
    </div>
  </div>

  <div class="sec">
    <div class="sec-lbl">Arka Plan Medya <span style="font-size:9px;font-weight:400;text-transform:none">· JPEG · GIF · MP4 · 9:16</span></div>
    <div class="mz" onclick="document.getElementById('fi-${active}').click()">
      <input type="file" id="fi-${active}" accept="image/jpeg,image/gif,video/mp4" style="display:none" onchange="handleUpload(this,'${active}')">
      <div class="mt">${media?`<span style="font-size:9px;color:var(--text2);text-align:center">${media.is_video?"▶ MP4":"🖼 IMG"}</span>`:`<span style="font-size:22px;color:var(--text3)">+</span>`}</div>
      <div class="mi">${media
        ?`<strong>${media.name}</strong><br>${media.size} · yüklendi ✓`
        :`<strong>Arka plan yükle</strong><br>JPEG, GIF veya MP4 · 9:16 formatında<br>Yüklenmezse siyah arka plan kullanılır`
      }</div>
      ${media?`<button onclick="event.stopPropagation();removeMedia('${active}')" style="margin-left:auto;padding:4px 8px;font-size:11px;color:var(--danger);background:none;border:none;cursor:pointer">Kaldır</button>`:""}
    </div>
  </div>

  <div class="sec" id="music-sec">
    <div class="sec-lbl">Müzik <span style="font-size:9px;font-weight:400;text-transform:none">· Telifsiz · YouTube Safe</span></div>
    ${renderMusicSection()}
  </div>

  <div class="sec">
    <div class="sec-lbl">Veri Çekimi</div>
    <div class="fr">
      <input type="datetime-local" id="dt-from" value="${dateFrom}" onchange="dateFrom=this.value">
      <span style="font-size:11px;color:var(--text3)">—</span>
      <input type="datetime-local" id="dt-to"   value="${dateTo}"   onchange="dateTo=this.value">
      <button class="fbtn" id="fbtn" onclick="doFetch('${active}')" ${ld?"disabled":""}>
        ${ld?`<span class="spin">◌</span> Çekiliyor...`:`↓ Fetch Data`}
      </button>
      ${rows.length&&!ld?`<span style="font-size:11px;color:var(--success)">✓ ${rows.length} sonuç</span>`:""}
    </div>
    ${err?`<div class="errbox">⚠ ${err}</div>`:""}
    ${dl?`<div class="dl-box" style="margin-top:8px">
      <span style="font-size:12px;color:var(--success)">✓ Reel hazır!</span>
      <a class="dl-btn" href="${BASE}${dl}" download>⬇ MP4 İndir</a>
    </div>`:""}
  </div>

  <div class="rsec">
    <div class="rh">
      <div class="rt">Sonuçlar ${rows.length?`<span style="font-size:11px;font-weight:400;color:var(--text3)">${groups.length} lig · ${rows.length} maç</span>`:""}
      </div>
      <button class="addbtn" onclick="startAdd()">+ Ekle</button>
    </div>

    ${adding?renderAddForm():""}

    ${ld?`<div class="loading"><span class="spin" style="font-size:24px">◌</span><br><br>API'den veriler çekiliyor...</div>`:
      rows.length?groups.map(([lg,lr])=>renderGroup(lg,lr)).join(""):
      `<div class="empty">Sonuç yok — Fetch Data ile çek ya da + Ekle ile manual ekle</div>`}
  </div>

  <div class="rbar">
    <div class="rmeta" id="rebar-meta"></div>
    <button class="rbtn" id="rbtn" onclick="makeReel()" ${rows.length?"":"disabled"}>
      <span>🎬</span> Make Reel
    </button>
  </div>`;

  refreshRebar();
}

function refreshRebar(){
  const el = document.getElementById("rebar-meta");
  if(!el) return;
  const rows  = DATA[active]||[];
  const media = MEDIA[active];
  const ch    = document.getElementById("ch-name")?.value||"";
  if(rows.length){
    el.innerHTML = `<strong>${rows.length} items</strong> · BG: ${media?media.name+" ✓":"Default"}<br>Channel: <strong>${ch||"— enter channel name"}</strong>`;
  } else {
    el.textContent = "Fetch data or add items manually";
  }
}

function renderGroup(lg, rows){
  const col = lcolor(lg);
  const key = active+":"+lg;
  const cn  = LNAMES[key]||"";
  return `<div class="lg-group">
    <div class="lg-hdr">
      <div class="lg-dot" style="background:${col}"></div>
      <span class="lg-def">${lg}</span>
      <span class="lg-sep">→</span>
      <input class="lg-cinp" type="text" value="${cn}" placeholder="${lg} (varsayılan)"
        oninput="LNAMES['${active}:${lg}']=this.value;refreshRebar()" title="Reels'te görünecek isim">
      <span class="lg-cnt">${rows.length} maç</span>
    </div>
    <table>
      <thead><tr>
        <th style="width:27%">Ev sahibi</th>
        <th style="width:13%">Skor</th>
        <th style="width:26%">Deplasman</th>
        <th style="width:13%">Durum</th>
        <th style="width:11%">Saat</th>
        <th style="width:10%"></th>
      </tr></thead>
      <tbody>${rows.map(r=>editId===r.id?renderEditRow(r):renderRow(r)).join("")}</tbody>
    </table>
  </div>`;
}

function renderRow(r){
  return `<tr>
    <td style="font-weight:600">${r.home}</td>
    <td><span class="sc">${r.score}</span></td>
    <td>${r.away}</td>
    <td><span class="pill${r.status==="FT"||r.status==="ENDED"||r.status==="AOT"?"":" ns"}">${r.status||"FT"}</span></td>
    <td style="color:var(--text3);font-size:11px">${r.time||"—"}</td>
    <td><div class="acts">
      <button class="ib" onclick="startEdit('${r.id}')" title="Düzenle">✎</button>
      <button class="ib del" onclick="delRow('${r.id}')" title="Sil">✕</button>
    </div></td>
  </tr>`;
}

function renderEditRow(r){
  return `<tr class="etr">
    <td><input class="ei" id="e-home"   value="${escQ(r.home)}"></td>
    <td><input class="ei" id="e-score"  value="${escQ(r.score)}" style="width:60px;text-align:center"></td>
    <td><input class="ei" id="e-away"   value="${escQ(r.away)}"></td>
    <td><input class="ei" id="e-status" value="${escQ(r.status||"FT")}" style="width:50px"></td>
    <td><input class="ei" id="e-time"   value="${escQ(r.time||"")}" style="width:55px"></td>
    <td><div class="acts">
      <button class="ib" onclick="saveEdit('${r.id}')" style="color:var(--success)">✓</button>
      <button class="ib" onclick="cancelEdit()">✕</button>
    </div></td>
  </tr>`;
}

function renderAddForm(){
  return `<div class="af">
    <input class="afi" id="a-home"   placeholder="Ev sahibi">
    <input class="afi" id="a-score"  placeholder="1–0" style="text-align:center">
    <input class="afi" id="a-away"   placeholder="Deplasman">
    <input class="afi" id="a-league" placeholder="Lig">
    <input class="afi" id="a-time"   placeholder="20:00">
    <div style="display:flex;gap:3px">
      <button class="ib" onclick="saveAdd()" style="color:var(--success);width:28px;height:28px">✓</button>
      <button class="ib" onclick="cancelAdd()" style="width:28px;height:28px">✕</button>
    </div>
  </div>`;
}

function renderMusicSection(){
  const mt     = musicTrack;
  const tracks = pixTracks;
  return `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      ${mt
        ? `<div style="display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--success-bg);border:0.5px solid #c0dd97;border-radius:var(--radius);flex:1">
            <span style="font-size:13px">🎵</span>
            <div>
              <div style="font-weight:600;font-size:12px">${mt.name}</div>
              <div style="font-size:11px;color:var(--text2)">${mt.size} · ${mt.type=="custom"?"Özel yükleme":"Pixabay Telifsiz"}</div>
            </div>
            <button onclick="removeMusicTrack()" style="margin-left:auto;font-size:11px;color:var(--danger);background:none;border:none;cursor:pointer;padding:4px">Kaldır</button>
          </div>`
        : `<span style="font-size:12px;color:var(--text3)">Müzik seçilmedi — reels sessiz üretilir</span>`
      }
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <button onclick="document.getElementById('mu').click()" style="height:28px;padding:0 12px;font-size:11px;border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--text)">
        ↑ Kendi MP3'ünü yükle
      </button>
      <input type="file" id="mu" accept=".mp3,.m4a,.aac,.wav,.ogg" style="display:none" onchange="uploadMusicFile(this)">
      <button onclick="loadPixabay()" style="height:28px;padding:0 12px;font-size:11px;border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--text)">${musicLoading?"◌ Yükleniyor...":"🎵 Telifsiz müzik seç"}</button>
    </div>
    ${tracks.length ? `
    <div style="border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px">
      ${tracks.map(t=>`
        <div style="display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:0.5px solid var(--border);cursor:pointer;background:${musicTrack&&musicTrack.filename==="pixabay_"+t.id+".mp3"?"var(--success-bg)":"transparent"}" onclick="selectPixabay('${t.id}')">
          <span style="font-size:12px;font-weight:600;min-width:90px;color:var(--text)">${t.name}</span>
          <span style="font-size:11px;color:var(--text2)">${t.mood}</span>
          <span style="font-size:10px;padding:1px 6px;border-radius:8px;background:var(--bg2);color:var(--text3)">${t.bpm} BPM</span>
          ${musicTrack&&musicTrack.filename==="pixabay_"+t.id+".mp3"?`<span style="margin-left:auto;font-size:10px;color:var(--success)">✓ Seçili</span>`:`<span style="margin-left:auto;font-size:10px;color:var(--info)">↓ Seç</span>`}
        </div>`).join("")}
    </div>` : ""}
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:11px;color:var(--text2);white-space:nowrap">Ses seviyesi:</span>
      <input type="range" min="10" max="100" value="${Math.round(musicVolume*100)}" step="5"
        style="flex:1" oninput="musicVolume=this.value/100;this.nextElementSibling.textContent=this.value+'%'">
      <span style="font-size:11px;min-width:32px">${Math.round(musicVolume*100)}%</span>
    </div>
  `;
}

async function loadPixabay(){
  if(pixTracks.length){ renderMain(); return; }
  musicLoading=true; renderMain();
  try{
    const r = await fetch("/api/music/tracks");
    const j = await r.json();
    pixTracks = j.tracks||[];
  }catch(e){ console.error(e); }
  musicLoading=false; renderMain();
}

async function selectPixabay(trackId){
  const track = pixTracks.find(t=>t.id===trackId);
  if(!track) return;
  const fname = "pixabay_"+trackId+".mp3";
  if(musicTrack && musicTrack.filename===fname){ removeMusicTrack(); return; }
  document.getElementById("api-status").textContent = "⏳ Müzik indiriliyor...";
  try{
    const r = await fetch("/api/music/download-pixabay",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({track_id:trackId})});
    const j = await r.json();
    if(!j.ok) throw new Error(j.error);
    musicTrack = {filename:j.filename, name:j.name, size:j.size, type:"pixabay"};
    document.getElementById("api-status").textContent = "✓ Müzik hazır";
    setTimeout(()=>document.getElementById("api-status").textContent="",3000);
  }catch(e){
    alert("Müzik indirme hatası: "+e.message);
    document.getElementById("api-status").textContent="";
  }
  renderMain();
}

async function uploadMusicFile(input){
  const file = input.files[0]; if(!file) return;
  const fd = new FormData(); fd.append("file",file);
  document.getElementById("api-status").textContent="⏳ Müzik yükleniyor...";
  try{
    const r = await fetch("/api/music/upload",{method:"POST",body:fd});
    const j = await r.json();
    if(!j.ok) throw new Error(j.error);
    musicTrack={filename:j.filename,name:j.name,size:j.size,type:"custom"};
    document.getElementById("api-status").textContent="✓ Müzik yüklendi";
    setTimeout(()=>document.getElementById("api-status").textContent="",3000);
  }catch(e){ alert("Yükleme hatası: "+e.message); document.getElementById("api-status").textContent=""; }
  renderMain();
}

function removeMusicTrack(){ musicTrack=null; renderMain(); }

function escQ(s){ return (s||"").replace(/"/g,"&quot;"); }

// ── CRUD ──────────────────────────────────────────────────────────────────────
function startEdit(id){ editId=id; adding=false; renderMain(); }
function cancelEdit(){ editId=null; renderMain(); }
function startAdd(){ adding=true; editId=null; renderMain(); setTimeout(()=>document.getElementById("a-home")?.focus(),50); }
function cancelAdd(){ adding=false; renderMain(); }

function saveEdit(id){
  const rows = DATA[active]||[];
  const i = rows.findIndex(r=>r.id==id);
  if(i>=0) rows[i] = {...rows[i],
    home:   document.getElementById("e-home").value,
    score:  document.getElementById("e-score").value,
    away:   document.getElementById("e-away").value,
    status: document.getElementById("e-status").value,
    time:   document.getElementById("e-time").value,
  };
  editId=null; renderMain(); renderSidebar();
}

function saveAdd(){
  if(!DATA[active]) DATA[active]=[];
  DATA[active].push({
    id:     "manual-"+(nid++),
    home:   document.getElementById("a-home").value   || "Takım A",
    score:  document.getElementById("a-score").value  || "0–0",
    away:   document.getElementById("a-away").value   || "Takım B",
    league: document.getElementById("a-league").value || "Lig",
    time:   document.getElementById("a-time").value   || "—",
    status: "FT",
  });
  adding=false; renderMain(); renderSidebar();
}

function delRow(id){
  DATA[active] = (DATA[active]||[]).filter(r=>r.id!=id);
  if(editId==id) editId=null;
  renderMain(); renderSidebar();
}

// ── Fetch Data ────────────────────────────────────────────────────────────────
async function doFetch(sportId){
  const sp = SPORTS.find(s=>s.id===sportId);
  if(!sp) return;

  dateFrom = document.getElementById("dt-from")?.value || dateFrom;
  dateTo   = document.getElementById("dt-to")?.value   || dateTo;

  const from = dateFrom.slice(0,10);
  const to   = dateTo.slice(0,10);

  LOADING[sportId] = true;
  LERR[sportId]    = null;
  renderSidebar(); renderMain();

  try {
    let url;
    if(sp.fetch_mode==="sport"){
      url = `${BASE}/api/fetch?sport_id=${sp.sport_id}&from=${from}&to=${to}`;
    } else {
      let params = `channel_id=${sp.channel_id}&from=${from}&to=${to}`;
      if(sp.fmt)       params += `&fmt=${sp.fmt}`;
      if(sp.continent) params += `&continent=${sp.continent}`;
      url = `${BASE}/api/fetch/channel?${params}`;
    }

    const res  = await fetch(url);
    const json = await res.json();
    if(!json.ok) throw new Error(json.error||"API error");
    DATA[sportId] = json.data||[];
    if(!DATA[sportId].length)
      LERR[sportId] = "No data found for this date range.";
  } catch(ex){
    LERR[sportId] = `Error: ${ex.message}`;
    if(!DATA[sportId]) DATA[sportId]=[];
  }

  LOADING[sportId] = false;
  renderSidebar(); renderMain();
}

// ── Media Upload ──────────────────────────────────────────────────────────────
async function handleUpload(input, sportId){
  const file = input.files[0];
  if(!file) return;
  const fd = new FormData();
  fd.append("file", file);
  fd.append("sport_id", sportId);
  try {
    document.getElementById("api-status").textContent = "⏳ Yükleniyor...";
    const res  = await fetch(`${BASE}/api/upload-media`, {method:"POST", body:fd});
    const json = await res.json();
    if(!json.ok) throw new Error(json.error);
    MEDIA[sportId] = {filename:json.filename, name:file.name, size:json.size, is_video:json.is_video};
    document.getElementById("api-status").textContent = "✓ Medya yüklendi";
    setTimeout(()=>document.getElementById("api-status").textContent="", 3000);
  } catch(ex){
    alert("Yükleme hatası: "+ex.message);
    document.getElementById("api-status").textContent = "";
  }
  renderMain();
}

function removeMedia(sportId){ delete MEDIA[sportId]; renderMain(); }

// ── Make Reel ─────────────────────────────────────────────────────────────────
async function makeReel(){
  const rows  = DATA[active]||[];
  if(!rows.length) return;

  const sp     = SPORTS.find(s=>s.id===active);
  const groups = groupBy(rows).map(([lg,lr])=>({
    league:       lg,
    display_name: LNAMES[active+":"+lg]||"",
    matches:      lr,
  }));

  const sport_id = THEME_MAP[active] || "futbol";
  const body = {
    sport_id:       sport_id,
    sport_name:     sp.name,
    channel_name:   document.getElementById("ch-name")?.value||"",
    bg_filename:    MEDIA[active]?.filename||null,
    music_filename: musicTrack?.filename||null,
    music_volume:   musicVolume,
    groups,
  };

  const rbtn = document.getElementById("rbtn");
  if(rbtn){ rbtn.disabled=true; rbtn.innerHTML='<span class="spin">◌</span> Üretiliyor...'; }
  document.getElementById("api-status").textContent = "⏳ Video üretiliyor...";

  try {
    const res  = await fetch(`${BASE}/api/make-reel`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body),
    });
    const json = await res.json();
    if(!json.ok) throw new Error(json.error);
    DLURL[active] = json.download_url;
    document.getElementById("api-status").textContent = "✓ Reel hazır!";
    setTimeout(()=>document.getElementById("api-status").textContent="", 5000);
  } catch(ex){
    alert("Video üretme hatası:\n"+ex.message);
    document.getElementById("api-status").textContent = "";
  }

  renderMain();
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById("ch-name").value = getChannelName(active);
renderSidebar();
renderMain();
</script>
